[build]
  command = "npx puppeteer browsers install chrome && npm run build"
  publish = "dist"

# Fires a repository_dispatch on GitHub after a successful production deploy
# so the e2e-post-deploy smoke workflow can run against the new build.
# Requires env vars GH_DISPATCH_TOKEN and GH_DISPATCH_REPO to be set in
# Netlify site settings.
[[plugins]]
  package = "./plugins/github-dispatch"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' https://res.cloudinary.com https://*.googleusercontent.com https://www.google.com https://cdn.discordapp.com data: blob:; media-src 'self' https://res.cloudinary.com; connect-src 'self' https://*.supabase.co https://fonts.googleapis.com https://fonts.gstatic.com https://res.cloudinary.com; worker-src 'self'; frame-ancestors 'none'"

# Redirect netlify.app subdomain to custom domain.
# force = false (default) so static files (sw.js, workbox-*.js, etc.) are served directly —
# the browser rejects cross-origin redirects for service worker scripts, which permanently
# breaks SW updates. Non-file routes still redirect; prerendered HTML routes are served
# and then redirected client-side via the hostname check in index.tsx.
[[redirects]]
  from = "https://starborne-planner.netlify.app/*"
  to = "https://starborneplanner.com/:splat"
  status = 301

# SPA fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
