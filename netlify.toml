[build]
  command = "npx puppeteer browsers install chrome && npm run build"
  publish = "dist"

# Fires a repository_dispatch on GitHub after a successful production deploy
# so the e2e-post-deploy smoke workflow can run against the new build.
# Requires env vars GH_DISPATCH_TOKEN and GH_DISPATCH_REPO to be set in
# Netlify site settings.
[[plugins]]
  package = "./plugins/github-dispatch"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' https://res.cloudinary.com https://*.googleusercontent.com https://www.google.com https://cdn.discordapp.com data: blob:; media-src 'self' https://res.cloudinary.com; connect-src 'self' https://*.supabase.co https://res.cloudinary.com; worker-src 'self'; frame-ancestors 'none'"

# NOTE: No server-side redirect for starborne-planner.netlify.app here.
# A netlify.toml cross-domain redirect (regardless of force setting) intercepts sw.js
# with a cross-origin 301, which browsers permanently reject for service worker scripts.
# That freezes all stale SW clients forever. Redirect is handled instead by:
#   - index.tsx hostname check (app-level, fires after SW serves new code)
#   - public/sw-redirect.js (SW-level fetch + activate handlers)

# SPA fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
